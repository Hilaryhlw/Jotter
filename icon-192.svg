<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Parchment background -->
  <rect width="192" height="192" fill="#f0ebe0" rx="36"/>

  <!-- Book shadow -->
  <rect x="46" y="34" width="106" height="130" rx="5" fill="#1a1710" opacity="0.10"/>
  <!-- Book pages -->
  <rect x="42" y="30" width="106" height="130" rx="4" fill="#ede6d4" stroke="#c8c0b0" stroke-width="1.5"/>
  <!-- Crimson spine -->
  <rect x="42" y="30" width="18" height="130" rx="4" fill="#8b2020"/>
  <!-- Spine shadow edge -->
  <rect x="56" y="30" width="4" height="130" fill="#6a1818" opacity="0.6"/>

  <!-- Three ruled lines — like a page waiting to be written -->
  <line x1="70" y1="80"  x2="134" y2="80"  stroke="#1a1710" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="70" y1="96"  x2="134" y2="96"  stroke="#1a1710" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="70" y1="112" x2="134" y2="112" stroke="#1a1710" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>

  <!-- Quill nib — a clean diamond nib shape, crimson -->
  <!-- Nib body: a diamond/leaf pointing down -->
  <path d="M 102 58 L 122 90 L 102 138 L 82 90 Z"
        fill="#8b2020" opacity="0.92"/>
  <!-- Nib split — vertical slit down the center -->
  <line x1="102" y1="90" x2="102" y2="138"
        stroke="#ede6d4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nib shoulder highlight -->
  <path d="M 102 58 L 122 90 L 102 96 L 82 90 Z"
        fill="#c8524a" opacity="0.5"/>
  <!-- Ink drop at tip -->
  <circle cx="102" cy="141" r="4.5" fill="#8b2020" opacity="0.85"/>
</svg>
